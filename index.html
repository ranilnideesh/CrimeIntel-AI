<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrimeIntel AI: Intelligent Evidence Analysis & Case Support System</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            police: {
              950: '#020617',
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
              accent: '#06b6d4',
              glow: '#6366f1',
              alert: '#ef4444'
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Leaflet Map CSS and Script -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React UMD scripts -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel compiler to compile JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Axios for requests -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Outfit', sans-serif;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .glow-border {
      border: 1px solid rgba(6, 182, 212, 0.25);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.08);
      transition: all 0.3s ease;
    }
    .glow-border:hover {
      border: 1px solid rgba(6, 182, 212, 0.5);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.18);
    }
  </style>
</head>
<body class="h-full text-slate-100 antialiased overflow-hidden">
  <div id="root" class="h-full"></div>

  <!-- React Source Code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- MAIN REACT COMPONENT ---
    function App() {
      // Auth State
      const [token, setToken] = useState(localStorage.getItem('police_token') || null);
      const [role, setRole] = useState(localStorage.getItem('police_role') || null);
      const [username, setUsername] = useState(localStorage.getItem('police_username') || null);
      
      // App State
      const [activePage, setActivePage] = useState('landing');
      const [cases, setCases] = useState([]);
      const [selectedCaseId, setSelectedCaseId] = useState(null);
      const [stats, setStats] = useState(null);
      const [logs, setLogs] = useState([]);
      
      // Selected Case context object
      const selectedCase = cases.find(c => c.id === selectedCaseId) || null;

      // Axios auth header sync
      useEffect(() => {
        if (token) {
          axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
          fetchCases();
          fetchStats();
        } else {
          delete axios.defaults.headers.common['Authorization'];
          setActivePage('landing');
        }
      }, [token]);

      const fetchCases = async () => {
        try {
          const res = await axios.get('/api/v1/cases/');
          setCases(res.data);
          if (res.data.length > 0 && !selectedCaseId) {
            setSelectedCaseId(res.data[0].id);
          }
        } catch (e) {
          console.error("Error fetching cases", e);
        }
      };

      const fetchStats = async () => {
        try {
          const res = await axios.get('/api/v1/dashboard/stats');
          setStats(res.data);
        } catch (e) {
          console.error("Error fetching stats", e);
        }
      };

      const handleLogin = (token, role, username) => {
        localStorage.setItem('police_token', token);
        localStorage.setItem('police_role', role);
        localStorage.setItem('police_username', username);
        setToken(token);
        setRole(role);
        setUsername(username);
        setActivePage('dashboard');
      };

      const handleLogout = () => {
        localStorage.removeItem('police_token');
        localStorage.removeItem('police_role');
        localStorage.removeItem('police_username');
        setToken(null);
        setRole(null);
        setUsername(null);
        setCases([]);
        setSelectedCaseId(null);
        setStats(null);
        setActivePage('landing');
      };

      // Lucide icons parser helper
      useEffect(() => {
        lucide.createIcons();
      }, [activePage, token]);

      return (
        <div class="h-full flex flex-col">
          {/* Header Bar */}
          <header class="glass-panel border-b border-slate-800 px-6 py-4 flex justify-between items-center z-10">
            <div class="flex items-center space-x-3 cursor-pointer" onClick={() => setActivePage(token ? 'dashboard' : 'landing')}>
              <div class="w-10 h-10 rounded-lg bg-cyan-950 border border-cyan-500 flex items-center justify-center text-cyan-400">
                <i data-lucide="shield-alert" class="w-6 h-6"></i>
              </div>
              <div>
                <h1 class="text-lg font-bold tracking-wider text-slate-100 flex items-center">
                  CRIMEINTEL AI
                  <span class="ml-2 text-xs bg-cyan-950 border border-cyan-500/30 text-cyan-400 px-1.5 py-0.5 rounded uppercase font-semibold tracking-normal">Support Node</span>
                </h1>
                <p class="text-xxs text-slate-400 uppercase tracking-widest leading-none mt-0.5">Evidence Analysis & Investigation Support</p>
              </div>
            </div>

            {/* Case Selection Dropdown (Only when logged in) */}
            {token && (
              <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
                  <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Active Case Context:</span>
                  <select 
                    class="bg-slate-900 border border-slate-700 text-slate-100 text-xs rounded px-3 py-1.5 outline-none focus:border-cyan-500"
                    value={selectedCaseId || ''} 
                    onChange={(e) => setSelectedCaseId(Number(e.target.value))}
                  >
                    {cases.map(c => (
                      <option key={c.id} value={c.id}>{c.case_number} - {c.title}</option>
                    ))}
                  </select>
                </div>
                
                <div class="flex items-center space-x-3 border-l border-slate-800 pl-4">
                  <div class="text-right">
                    <p class="text-xs font-semibold text-slate-200">{username}</p>
                    <p class="text-xxs text-cyan-400 uppercase tracking-wider">{role}</p>
                  </div>
                  <button 
                    onClick={handleLogout}
                    class="bg-slate-900 hover:bg-red-950/30 border border-slate-800 hover:border-red-900/50 text-slate-400 hover:text-red-400 p-2 rounded transition-all"
                    title="Logout Securely"
                  >
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            )}
          </header>

          {/* Main Layout Area */}
          <div class="flex-1 flex overflow-hidden">
            {/* Sidebar Navigation */}
            {token && (
              <aside class="w-64 glass-panel border-r border-slate-800 flex flex-col justify-between overflow-y-auto">
                <div class="py-4 px-3 space-y-6">
                  {/* Category: Dashboards */}
                  <div>
                    <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Workspace</p>
                    <div class="space-y-1">
                      <SidebarLink active={activePage==='dashboard'} onClick={()=>setActivePage('dashboard')} label="Officer Dashboard" icon="layout-dashboard" />
                      <SidebarLink active={activePage==='new-case'} onClick={()=>setActivePage('new-case')} label="New Case Entry" icon="file-plus" />
                      <SidebarLink active={activePage==='evidence-upload'} onClick={()=>setActivePage('evidence-upload')} label="Evidence Vault" icon="upload-cloud" />
                    </div>
                  </div>

                  {/* Category: Forensic & AI */}
                  <div>
                    <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Forensic Intelligence</p>
                    <div class="space-y-1">
                      <SidebarLink active={activePage==='ai-analysis'} onClick={()=>setActivePage('ai-analysis')} label="AI Evidence Analyzer" icon="cpu" />
                      <SidebarLink active={activePage==='historical-compare'} onClick={()=>setActivePage('historical-compare')} label="MO Similarity Compare" icon="split" />
                      <SidebarLink active={activePage==='lead-generation'} onClick={()=>setActivePage('lead-generation')} label="Actionable Leads" icon="sparkles" />
                      <SidebarLink active={activePage==='case-timeline'} onClick={()=>setActivePage('case-timeline')} label="Case Milestones" icon="check-square" />
                    </div>
                  </div>

                  {/* Category: Mapping & Graphs */}
                  <div>
                    <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Spatial & Link Graphs</p>
                    <div class="space-y-1">
                      <SidebarLink active={activePage==='crime-map'} onClick={()=>setActivePage('crime-map')} label="Crime Hotspots Map" icon="map" />
                      <SidebarLink active={activePage==='evidence-graph'} onClick={()=>setActivePage('evidence-graph')} label="Entity Relation Graph" icon="git-fork" />
                      <SidebarLink active={activePage==='outcome-prediction'} onClick={()=>setActivePage('outcome-prediction')} label="Case Outcome Predictor" icon="trending-up" />
                    </div>
                  </div>

                  {/* Category: Communications & Admin */}
                  <div>
                    <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">Dossier & Help</p>
                    <div class="space-y-1">
                      <SidebarLink active={activePage==='chatbot'} onClick={()=>setActivePage('chatbot')} label="AI Chatbot Copilot" icon="message-square" />
                      <SidebarLink active={activePage==='report-download'} onClick={()=>setActivePage('report-download')} label="Dossier Generator" icon="file-text" />
                      <SidebarLink active={activePage==='emergency-help'} onClick={()=>setActivePage('emergency-help')} label="Emergency Help Desk" icon="phone-call" />
                      {role === 'Admin' && (
                        <SidebarLink active={activePage==='admin-panel'} onClick={()=>setActivePage('admin-panel')} label="System Audit Log" icon="activity" />
                      )}
                    </div>
                  </div>
                </div>

                <div class="p-4 border-t border-slate-900 bg-slate-950/50">
                  <div class="flex items-center space-x-2 text-xxs text-slate-500 font-semibold tracking-wider">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 pulse-glow-element"></span>
                    <span>SECURE POLICE ENCRYPTED CHANNEL</span>
                  </div>
                </div>
              </aside>
            )}

            {/* Page Render Container */}
            <main class="flex-1 bg-slate-950/30 p-6 overflow-y-auto">
              {activePage === 'landing' && <LandingPage onGoToLogin={() => setActivePage('login')} />}
              {activePage === 'login' && <LoginPage onLogin={handleLogin} />}
              
              {token && (
                <>
                  {activePage === 'dashboard' && <Dashboard stats={stats} userRole={role} currentCase={selectedCase} />}
                  {activePage === 'new-case' && <NewCase onCaseCreated={fetchCases} />}
                  {activePage === 'evidence-upload' && <EvidenceUpload currentCase={selectedCase} onUpload={fetchStats} />}
                  {activePage === 'ai-analysis' && <AIAnalysis currentCase={selectedCase} />}
                  {activePage === 'historical-compare' && <HistoricalCompare currentCase={selectedCase} />}
                  {activePage === 'lead-generation' && <LeadGeneration currentCase={selectedCase} />}
                  {activePage === 'case-timeline' && <CaseTimeline currentCase={selectedCase} />}
                  {activePage === 'crime-map' && <CrimeMap />}
                  {activePage === 'evidence-graph' && <EvidenceGraph currentCase={selectedCase} />}
                  {activePage === 'outcome-prediction' && <OutcomePrediction currentCase={selectedCase} />}
                  {activePage === 'chatbot' && <ChatbotAssistant currentCase={selectedCase} />}
                  {activePage === 'report-download' && <ReportDownload currentCase={selectedCase} />}
                  {activePage === 'emergency-help' && <EmergencyHelp />}
                  {activePage === 'admin-panel' && role === 'Admin' && <AdminPanel />}
                </>
              )}
            </main>
          </div>
        </div>
      );
    }

    // --- SIDEBAR LINK HELPER ---
    function SidebarLink({ active, onClick, label, icon }) {
      return (
        <button 
          onClick={onClick}
          class={`w-full flex items-center space-x-3 px-3 py-2 rounded text-xs transition-all font-medium ${
            active 
              ? 'bg-cyan-950/60 border border-cyan-800/40 text-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.06)]' 
              : 'text-slate-400 hover:bg-slate-900/50 hover:text-slate-200'
          }`}
        >
          <i data-lucide={icon} class="w-4 h-4"></i>
          <span>{label}</span>
        </button>
      );
    }

    // --- PAGE 1: LANDING PAGE ---
    function LandingPage({ onGoToLogin }) {
      return (
        <div class="max-w-4xl mx-auto py-12 space-y-12">
          <div class="text-center space-y-4">
            <div class="inline-flex p-3 rounded-full bg-cyan-950 border border-cyan-500/30 text-cyan-400 mb-2">
              <i data-lucide="shield-alert" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-white sm:text-5xl">
              CrimeIntel AI
            </h1>
            <p class="text-lg text-slate-400 max-w-xl mx-auto">
              Intelligent Evidence Analysis, Crime Pattern Mining & Decision Support System. Empowering police investigators with secure, explainable AI analytics.
            </p>
            <div class="pt-6">
              <button 
                onClick={onGoToLogin}
                class="bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white text-sm font-semibold py-3 px-8 rounded-lg shadow-lg hover:shadow-cyan-500/20 transition-all uppercase tracking-wider"
              >
                Access Secure Portal
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <FeatureCard icon="cpu" title="AI Evidence Analysis" description="Auto classify and process images, CCTV feed frames, FIRs, phone logs and coordinate data using Deep Learning." />
            <FeatureCard icon="git-fork" title="Entity Graphs" description="Predict criminal relationships, trace weapon links, and highlight accomplice groups using GNN mapping." />
            <FeatureCard icon="split" title="MO Matcher" description="Compare case description text against historical arrest databases to extract matching crime patterns." />
          </div>

          <div class="glass-panel p-6 rounded-lg text-center border-l-4 border-cyan-500 text-slate-300 text-xs">
            <p class="font-semibold uppercase tracking-wider text-cyan-400 mb-2">Important Notice on Judicial Boundary Limit</p>
            This system does NOT declare guilt or make convictions. It strictly compiles data to generate probabilistic investigative leads, risk assessments, and tactical route models. Final judicial determinations rest solely with authorized human agencies.
          </div>
        </div>
      );
    }

    function FeatureCard({ icon, title, description }) {
      return (
        <div class="glass-panel p-5 rounded-lg border border-slate-800 hover:border-slate-700 transition-all text-center">
          <div class="w-8 h-8 rounded-lg bg-cyan-950/40 text-cyan-400 flex items-center justify-center mx-auto mb-3">
            <i data-lucide={icon} class="w-5 h-5"></i>
          </div>
          <h3 class="text-sm font-semibold text-slate-200 mb-1">{title}</h3>
          <p class="text-xs text-slate-400 leading-relaxed">{description}</p>
        </div>
      );
    }

    // --- PAGE 2: OFFICER SECURE LOGIN ---
    function LoginPage({ onLogin }) {
      const [user, setUser] = useState('');
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setErr('');
        try {
          const params = new URLSearchParams();
          params.append('username', user);
          params.append('password', pwd);
          
          const res = await axios.post('/api/v1/auth/login', params, {
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
          });
          
          onLogin(res.data.access_token, res.data.role, res.data.username);
        } catch (error) {
          setErr("Authentication failed. Check credentials and retry.");
        }
      };

      return (
        <div class="max-w-md mx-auto mt-16 glass-panel p-8 rounded-xl border border-slate-800 glow-border">
          <div class="text-center mb-6">
            <div class="w-12 h-12 rounded-full bg-cyan-950 text-cyan-400 flex items-center justify-center mx-auto mb-3">
              <i data-lucide="lock" class="w-6 h-6"></i>
            </div>
            <h2 class="text-xl font-bold text-white uppercase tracking-wider">Terminal Security Gate</h2>
            <p class="text-xs text-slate-400 mt-1">Law Enforcement Authenticator</p>
          </div>

          {err && <div class="bg-red-950/40 border border-red-500/30 text-red-400 p-3 rounded text-xs mb-4 text-center">{err}</div>}

          <form onSubmit={handleSubmit} class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">Officer Username</label>
              <input 
                type="text" 
                required 
                class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm outline-none focus:border-cyan-500 text-white" 
                placeholder="e.g. officer_sharma"
                value={user}
                onChange={e => setUser(e.target.value)}
              />
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">Access Token Password</label>
              <input 
                type="password" 
                required 
                class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm outline-none focus:border-cyan-500 text-white" 
                placeholder="••••••••••••"
                value={pwd}
                onChange={e => setPwd(e.target.value)}
              />
            </div>
            <button 
              type="submit" 
              class="w-full bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded transition-all mt-4"
            >
              Sign-In to Terminal
            </button>
          </form>
          
          <div class="mt-6 border-t border-slate-800 pt-4 text-center text-xxs text-slate-500 leading-normal">
            Unauthorized access attempts are logged under section IPC 43/66. <br/>
            Seeded logins: <b>officer_sharma</b> / <b>password123</b>
          </div>
        </div>
      );
    }

    // --- PAGE 3: DASHBOARD ---
    function Dashboard({ stats, userRole, currentCase }) {
      if (!stats) return <div class="text-xs text-slate-400">Loading terminal analytics...</div>;

      return (
        <div class="space-y-6">
          <div class="flex justify-between items-center">
            <div>
              <h2 class="text-xl font-bold tracking-wider uppercase text-white">Investigation Telemetry</h2>
              <p class="text-xs text-slate-400">Officer role: <span class="text-cyan-400 font-bold">{userRole}</span></p>
            </div>
            {currentCase && (
              <div class="bg-cyan-950/40 border border-cyan-800/30 px-4 py-2 rounded-lg flex items-center space-x-3">
                <div>
                  <p class="text-xxs text-slate-400 uppercase tracking-widest leading-none">Selected Case Threat Score</p>
                  <p class="text-lg font-bold text-cyan-400">{currentCase.risk_score}%</p>
                </div>
                <div class="w-1.5 h-8 bg-cyan-500 rounded"></div>
              </div>
            )}
          </div>

          {/* Quick Stats Grid */}
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <MetricBox icon="folder" label="Total Registered Cases" value={stats.total_cases} color="text-slate-200" />
            <MetricBox icon="folder-open" label="Active Enquiries" value={stats.active_cases} color="text-amber-400" />
            <MetricBox icon="check-circle" label="Cases Resolved" value={stats.solved_cases} color="text-emerald-400" />
            <MetricBox icon="database" label="Evidence Items Cataloged" value={stats.evidence_count} color="text-cyan-400" />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {/* AI Generated Leads */}
            <div class="glass-panel p-5 rounded-xl border border-slate-800 space-y-4 md:col-span-2">
              <h3 class="text-sm font-bold uppercase tracking-wider text-slate-200 flex items-center">
                <i data-lucide="sparkles" class="w-4 h-4 mr-2 text-cyan-400"></i>
                Active AI Leads Intelligence (High-Conf)
              </h3>
              <div class="divide-y divide-slate-900">
                {stats.recent_leads.map((l) => (
                  <div key={l.id} class="py-3 flex justify-between items-start space-x-4">
                    <div>
                      <h4 class="text-xs font-semibold text-slate-200">{l.title}</h4>
                      <p class="text-xxs text-slate-400 leading-relaxed mt-0.5">{l.description}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                      <span class="text-xxs font-bold text-cyan-400 px-2 py-0.5 bg-cyan-950 border border-cyan-800/40 rounded">
                        {l.confidence_score}% Conf
                      </span>
                      <p class="text-xxs text-slate-500 mt-1 uppercase tracking-widest">{l.source}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Risk Sector Dashboard */}
            <div class="glass-panel p-5 rounded-xl border border-slate-800 space-y-4">
              <h3 class="text-sm font-bold uppercase tracking-wider text-slate-200 flex items-center">
                <i data-lucide="alert-triangle" class="w-4 h-4 mr-2 text-amber-500"></i>
                Critical Sector Vulnerabilities
              </h3>
              <div class="space-y-4">
                {stats.risk_areas.map((r, i) => (
                  <div key={i} class="space-y-1.5">
                    <div class="flex justify-between items-center text-xs">
                      <span class="text-slate-300 font-medium truncate w-40">{r.sector}</span>
                      <span class={`font-bold ${r.score > 70 ? 'text-red-400' : 'text-amber-400'}`}>{r.score}%</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-1.5 overflow-hidden">
                      <div class={`h-full ${r.score > 70 ? 'bg-red-500' : 'bg-amber-500'}`} style={{width: `${r.score}%`}}></div>
                    </div>
                  </div>
                ))}
              </div>

              <div class="pt-2 border-t border-slate-900 space-y-2">
                <p class="text-xxs font-bold uppercase tracking-widest text-slate-500">General AI Recommendation</p>
                <div class="bg-cyan-950/20 border border-cyan-950/40 p-2.5 rounded text-xxs text-slate-300 leading-relaxed italic">
                  "Ensure cross-jurisdictional checkposts verify vehicle records using modus operandi match templates to prevent escapes."
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MetricBox({ icon, label, value, color }) {
      return (
        <div class="glass-panel p-4 rounded-xl border border-slate-800 flex items-center space-x-4">
          <div class={`w-10 h-10 rounded-lg bg-slate-900 border border-slate-850 flex items-center justify-center ${color}`}>
            <i data-lucide={icon} class="w-5 h-5"></i>
          </div>
          <div>
            <p class="text-xxs text-slate-500 uppercase tracking-widest leading-none mb-1 font-semibold">{label}</p>

    // --- PAGE 4: NEW CASE REGISTRATION ---
    function NewCase({ onCaseCreated }) {

      const [title, setTitle] = useState('');
      const [desc, setDesc] = useState('');

      const handleSubmit = async (e) => {

            description: desc
          });

          setTitle('');
          setDesc('');

        <div class="max-w-2xl mx-auto glass-panel p-6 rounded-xl border border-slate-800">
          <h2 class="text-lg font-bold uppercase tracking-wider text-slate-100 mb-4 flex items-center">
            <i data-lucide="file-plus" class="w-5 h-5 mr-2 text-cyan-400"></i>

              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">Case Title</label>
                <input 
                  type="text" 
                  required 
                  class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-xs outline-none focus:border-cyan-500 text-white" 
                  placeholder="Connaught Place burglary"
                  value={title}
                  onChange={e => setTitle(e.target.value)}

            <div>

    // --- PAGE 5: EVIDENCE UPLOAD ---
    function EvidenceUpload({ currentCase, onUpload }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to access uploads.</div>;

      const [name, setName] = useState('');
      const [type, setType] = useState('auto');
      const [file, setFile] = useState(null);
      const [msg, setMsg] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!file) return;
        setMsg('');
        try {
          const fd = new FormData();
          fd.append('case_id', currentCase.id);
          fd.append('name', name);
          fd.append('type', type);
          fd.append('file', file);
          
          await axios.post('/api/v1/evidence/upload', fd, {
            headers: { 'Content-Type': 'multipart/form-data' }
          });
          
          setMsg("Evidence securely uploaded, classified, and logging in audit logs completed.");
          setName('');
          setFile(null);
          onUpload();
        } catch (error) {
          setMsg(error.response?.data?.detail || "Upload failed.");
        }
      };

      return (
        <div class="max-w-2xl mx-auto glass-panel p-6 rounded-xl border border-slate-800">
          <h2 class="text-lg font-bold uppercase tracking-wider text-slate-100 mb-1 flex items-center">
            <i data-lucide="upload-cloud" class="w-5 h-5 mr-2 text-cyan-400"></i>
            Ingest Evidence into Cryptographic Storage
          </h2>
          <p class="text-xxs text-slate-400 uppercase tracking-wider mb-4">Case Context: {currentCase.case_number}</p>

          {msg && <div class="bg-cyan-950/40 border border-cyan-500/30 text-cyan-400 p-3 rounded text-xs mb-4 text-center">{msg}</div>}

          <form onSubmit={handleSubmit} class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">Evidence Label / Name</label>
                <input 
                  type="text" 
                  required 
                  class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-xs outline-none focus:border-cyan-500 text-white" 
                  placeholder="Connaught CCTV main road"
                  value={name}
                  onChange={e => setName(e.target.value)}
                />
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">Evidence Category Type</label>
                <select 
                  class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-xs outline-none focus:border-cyan-500 text-white"
                  value={type} 
                  onChange={e => setType(e.target.value)}
                >
                  <option value="auto">Auto-Classify (AI Scanner Mode)</option>
                  <option value="Image">Crime Scene Image</option>
                  <option value="CCTV">CCTV Video Frame</option>
                  <option value="FIR PDF">FIR PDF File</option>

            </div>

            <div>
              <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">Select File (PDF, PNG, JPG, MP4, CSV, TXT)</label>
              <input 
                type="file" 
                required 
                onChange={e => setFile(e.target.files[0])}

              />
            </div>

            <button 
              type="submit" 
              class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold uppercase tracking-wider py-2.5 px-6 rounded transition-all"
            >
              Upload & Seal
            </button>
          </form>
        </div>
      );
    }

    // --- PAGE 6: AI EVIDENCE ANALYSIS ---
    function AIAnalysis({ currentCase }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to run analysis.</div>;

      const [evidence, setEvidence] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeItem, setActiveItem] = useState(null);
      const [result, setResult] = useState(null);

      useEffect(() => {
        fetchEvidence();
      }, [currentCase]);

      const fetchEvidence = async () => {
        const res = await axios.get(`/api/v1/evidence/case/${currentCase.id}`);
        setEvidence(res.data);
      };

      const handleAnalyze = async (item) => {
        setLoading(true);
        setActiveItem(item);
        setResult(null);
        try {
          let res;
          if (item.type === 'Image' || item.type === 'CCTV') {
            res = await axios.post(`/api/v1/analysis/image/${item.id}`);
          } else {
            res = await axios.post(`/api/v1/analysis/ocr-ner/${item.id}`);
          }
          setResult(res.data);
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="glass-panel p-5 rounded-xl border border-slate-800 space-y-4">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-200">Vault File List</h3>
            <div class="space-y-2">
              {evidence.map(e => (
                <div key={e.id} class="p-3 bg-slate-900/60 rounded border border-slate-800 flex justify-between items-center">
                  <div>
                    <h4 class="text-xs font-semibold text-slate-200">{e.name}</h4>
                    <p class="text-xxs text-slate-400 mt-0.5 uppercase tracking-widest">{e.type}</p>
                  </div>
                  <button 
                    onClick={() => handleAnalyze(e)}
                    class="bg-cyan-950/40 hover:bg-cyan-900 border border-cyan-850 hover:border-cyan-600 text-cyan-400 text-xxs font-bold uppercase px-2.5 py-1 rounded transition-all"
                  >
                    Analyze
                  </button>
                </div>
              ))}
              {evidence.length === 0 && <p class="text-xs text-slate-500">No vault files available. Go to Evidence Upload first.</p>}
            </div>
          </div>

          <div class="md:col-span-2 glass-panel p-5 rounded-xl border border-slate-800 space-y-4 min-h-[400px]">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-200 flex items-center">
              <i data-lucide="cpu" class="w-4 h-4 mr-2 text-cyan-400"></i>
              AI Analysis Console Output
            </h3>

            {loading && <div class="text-xs text-cyan-400">Running deep learning models (YOLOv8 & Transformer NER vectors)...</div>}

            {result && activeItem && (
              <div class="space-y-6">
                <div>
                  <h4 class="text-xs font-bold text-slate-300 uppercase tracking-widest border-b border-slate-800 pb-1 mb-2">Evidence Metadata</h4>
                  <p class="text-xs">File: <span class="text-slate-100 font-semibold">{activeItem.name}</span></p>
                  <p class="text-xs mt-1">Classification Confidence: <span class="text-cyan-400 font-bold">{(activeItem.confidence_score * 100).toFixed(1)}%</span></p>
                </div>

                {/* CV Output */}
                {(activeItem.type === 'Image' || activeItem.type === 'CCTV') && result.detections && (
                  <div class="space-y-4">
                    <h4 class="text-xs font-bold text-slate-300 uppercase tracking-widest border-b border-slate-800 pb-1">Computer Vision Bounding Box Logs</h4>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                      {result.detections.map((det, i) => (
                        <div key={i} class="p-2.5 bg-slate-900 rounded border border-slate-850">
                          <p class="text-xxs font-bold text-slate-400 uppercase tracking-widest">Class Label</p>
                          <p class="text-xs text-slate-100 font-semibold mt-0.5">{det.class}</p>
                          <p class="text-xxs text-cyan-400 mt-1 uppercase tracking-widest">{(det.confidence * 100).toFixed(0)}% Confidence</p>
                        </div>
                      ))}
                    </div>
                    {/* Bounding box simulated box visualization */}
                    <div class="w-full bg-slate-900 border border-slate-800 h-64 rounded-xl flex items-center justify-center relative overflow-hidden">
                      <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-cyan-950/20 to-slate-950"></div>
                      <div class="w-48 h-32 border-4 border-red-500 absolute top-12 left-16 flex flex-col justify-start p-1.5">
                        <span class="text-xxs font-bold bg-red-500 text-white px-1 py-0.5 uppercase tracking-wide self-start rounded">Weapon 91%</span>
                      </div>
                      <div class="w-32 h-32 border-4 border-emerald-500 absolute top-20 right-20 flex flex-col justify-start p-1.5">
                        <span class="text-xxs font-bold bg-emerald-500 text-white px-1 py-0.5 uppercase tracking-wide self-start rounded">Face 94%</span>
                      </div>
                      <p class="text-xxs text-slate-500 absolute bottom-4 uppercase tracking-widest font-semibold">CCTV FRAME GRID BOUNDS</p>
                    </div>
                  </div>
                )}

                {/* NLP / NER Output */}
                {result.entities && (
                  <div class="space-y-4">
                    <h4 class="text-xs font-bold text-slate-300 uppercase tracking-widest border-b border-slate-800 pb-1">Named Entity Vector Extraction (NER)</h4>
                    <div class="grid grid-cols-2 gap-4">
                      {Object.entries(result.entities).map(([label, values]) => (
                        <div key={label} class="p-3 bg-slate-900/60 rounded border border-slate-850">
                          <h5 class="text-xxs font-bold text-slate-500 uppercase tracking-widest mb-1.5">{label} Entities</h5>
                          <div class="flex flex-wrap gap-1.5">
                            {values.map((v, i) => (
                              <span key={i} class="text-xxs bg-cyan-950 border border-cyan-900 text-cyan-300 px-2 py-0.5 rounded font-semibold">{v}</span>
                            ))}
                            {values.length === 0 && <span class="text-xxs text-slate-600">None detected</span>}
                          </div>
                        </div>
                      ))}
                    </div>

                    <div class="space-y-1.5 pt-2">
                      <h4 class="text-xxs font-bold text-slate-500 uppercase tracking-widest">Raw Text Processed (OCR)</h4>
                      <p class="text-xs text-slate-300 leading-relaxed bg-slate-900/40 border border-slate-900 p-3 rounded italic">{result.raw_text}</p>
                    </div>
                  </div>
                )}
              </div>
            )}

            {!result && !loading && (
              <div class="flex flex-col items-center justify-center h-full text-slate-500 py-12">
                <i data-lucide="cpu" class="w-8 h-8 mb-2"></i>
                <p class="text-xs">Select a vault item and click 'Analyze' to execute CV/NLP pipeline.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- PAGE 7 & 8: HISTORICAL COMPARISON & CRIME PATTERNS ---
    function HistoricalCompare({ currentCase }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to load comparisons.</div>;

      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);

      const handleCompare = async () => {
        setLoading(true);
        try {
          const res = await axios.post(`/api/v1/intelligence/compare/${currentCase.id}`);
          setResults(res.data.matches);
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="space-y-6 max-w-4xl mx-auto">
          <div class="glass-panel p-5 rounded-xl border border-slate-800 space-y-4">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-200">Historical Case Comparison Console</h3>
            <p class="text-xs text-slate-400 leading-relaxed">
              This module triggers a TF-IDF cosine-similarity match vectoring your case description and checks it against previous FIR listings to discover modus operandi overlaps.
            </p>
            <button 
              onClick={handleCompare}
              disabled={loading}
              class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold uppercase tracking-wider py-2 px-6 rounded transition-all"
            >
              {loading ? "Matching patterns..." : "Find Similar Case Files"}
            </button>
          </div>

          {results && (
            <div class="space-y-4">
              <h3 class="text-sm font-bold uppercase tracking-wider text-slate-300">Modus Operandi Matches Found</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                {results.map((r, i) => (
                  <div key={i} class="glass-panel p-5 rounded-xl border border-slate-800 space-y-3">
                    <div class="flex justify-between items-start">
                      <div>
                        <span class="text-xxs text-cyan-400 font-bold bg-cyan-950 border border-cyan-900 px-1.5 py-0.5 rounded uppercase tracking-wider">{r.case_number}</span>
                        <h4 class="text-xs font-bold text-slate-100 mt-1">{r.title}</h4>
                      </div>
                      <span class={`text-xs font-extrabold ${r.similarity_score > 70 ? 'text-red-400' : 'text-amber-400'}`}>{r.similarity_score}% Match</span>
                    </div>

                    <div class="space-y-1.5">
                      <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest">Common Modus Operandi Keywords</p>
                      <div class="flex flex-wrap gap-1">
                        {r.modus_operandi_match.map((mo, idx) => (
                          <span key={idx} class="text-xxs bg-slate-900 border border-slate-850 px-2 py-0.5 rounded text-slate-300">{mo}</span>
                        ))}
                        {r.modus_operandi_match.length === 0 && <span class="text-xxs text-slate-600">None detected</span>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- PAGE 9: ACTIONABLE LEADS ---
    function LeadGeneration({ currentCase }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to retrieve leads.</div>;

      const [leads, setLeads] = useState([]);

            <span class="text-xs font-bold text-cyan-400 px-3 py-1 bg-cyan-950 border border-cyan-800/40 rounded uppercase tracking-wider">

          </div>

          <div class="space-y-4">

                    <span class="w-2 h-2 rounded-full bg-cyan-500 pulse-glow-element"></span>
                    <h3 class="text-xs font-bold text-slate-100 uppercase tracking-wider">{l.title}</h3>
                  </div>
                  <p class="text-xs text-slate-300 leading-relaxed">{l.description}</p>
                  <p class="text-xxs text-slate-500">Source channel: <span class="text-slate-400 font-semibold">{l.source}</span></p>
                </div>
                <div class="text-right flex-shrink-0">
                  <p class="text-xxs font-bold text-slate-400 uppercase tracking-widest leading-none">Confidence Rating</p>
                  <p class="text-lg font-bold text-cyan-400 mt-1">{l.confidence_score}%</p>
                </div>
              </div>

            {leads.length === 0 && <p class="text-xs text-slate-500 text-center py-12">No active leads generated for this case context.</p>}
          </div>
        </div>

    // --- PAGE 10 & 16: TIMELINE & OFFICER MILESTONES ---
    function CaseTimeline({ currentCase }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to load milestones.</div>;

      const [milestones, setMilestones] = useState([]);

      useEffect(() => {
        fetchMilestones();
      }, [currentCase]);

      const fetchMilestones = async () => {
        const res = await axios.get(`/api/v1/milestones/case/${currentCase.id}`);
        setMilestones(res.data);
      };

      const handleToggle = async (m) => {
        const nextStatus = m.status === 'Completed' ? 'Pending' : 'Completed';
        await axios.put(`/api/v1/milestones/${m.id}`, { status: nextStatus });
        fetchMilestones();
      };

      return (
        <div class="max-w-2xl mx-auto space-y-6">
          <div>
            <h2 class="text-lg font-bold uppercase tracking-wider text-slate-100">Investigation Milestone Checklist</h2>
            <p class="text-xxs text-slate-400 uppercase tracking-wider">Case Code: {currentCase.case_number}</p>
          </div>

          <div class="glass-panel p-6 rounded-xl border border-slate-800 space-y-4">
            {milestones.map((m, i) => (
              <div key={m.id} class="flex items-center justify-between p-3 bg-slate-900/60 rounded border border-slate-850">
                <div class="flex items-center space-x-3">
                  <button 
                    onClick={() => handleToggle(m)}
                    class={`w-5 h-5 rounded border flex items-center justify-center transition-all ${
                      m.status === 'Completed' 
                        ? 'bg-cyan-600 border-cyan-500 text-white' 
                        : 'border-slate-700 hover:border-cyan-500'
                    }`}
                  >
                    {m.status === 'Completed' && <i data-lucide="check" class="w-3.5 h-3.5"></i>}
                  </button>
                  <span class={`text-xs font-semibold ${m.status === 'Completed' ? 'line-through text-slate-500' : 'text-slate-200'}`}>{m.title}</span>
                </div>
                <span class={`text-xxs font-bold uppercase tracking-widest px-2 py-0.5 rounded ${
                  m.status === 'Completed' ? 'bg-emerald-950/40 text-emerald-400' : 'bg-slate-950 text-slate-500'
                }`}>{m.status}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // --- PAGE 11: CRIME HOTSPOT MAP (OPENSTREETMAP) ---
    function CrimeMap() {
      useEffect(() => {
        // Initialize Leaflet map dynamically
        const container = document.getElementById('leaflet-map-holder');
        if (container) {
          const map = L.map('leaflet-map-holder').setView([20.5937, 78.9629], 5); // Center on India
          
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
          }).addTo(map);

          // Hotspots data
          const hotspots = [
            {lat: 28.6304, lon: 77.2177, text: "Delhi Connaught Place: Armed Heist Cluster"},
            {lat: 12.9716, lon: 77.5946, text: "Bengaluru Whitefield: Phishing Nodes"},
            {lat: 19.0760, lon: 72.8777, text: "Mumbai-Pune Expressway: Cargo theft hijacking spots"}
          ];

          hotspots.forEach(h => {
            L.circle([h.lat, h.lon], {
              color: 'red',
              fillColor: '#f03',
              fillOpacity: 0.35,
              radius: 50000 // 50km circle
            }).addTo(map).bindPopup(h.text);
          });
        }
      }, []);

      return (
        <div class="space-y-4 h-full flex flex-col">
          <div>
            <h2 class="text-lg font-bold uppercase tracking-wider text-slate-100">National Crime Hotspot Map</h2>
            <p class="text-xs text-slate-400">OpenStreetMap Interactive Spatial Cluster Overlay (DBSCAN Clustering)</p>
          </div>
          <div class="flex-1 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden min-h-[400px]" id="leaflet-map-holder"></div>
        </div>
      );
    }

    // --- PAGE 12: EVIDENCE RELATIONSHIP GRAPH (SVG) ---

          <div class="flex-1 glass-panel border border-slate-800 rounded-xl relative overflow-hidden min-h-[400px] flex items-center justify-center">

            <div class="absolute bottom-4 right-4 bg-slate-900/90 border border-slate-800 p-3 rounded-lg text-xxs space-y-1">
              <p class="font-bold text-slate-400 uppercase tracking-widest mb-1.5">Link Prediction Legend</p>
              <div class="flex items-center space-x-2"><div class="w-3 h-0.5 bg-cyan-500"></div><span class="text-slate-300">Verified Evidence association</span></div>
              <div class="flex items-center space-x-2"><div class="w-3 h-0.5 bg-red-500 border-dashed border-t"></div><span class="text-slate-300">GNN Predicted Co-offender (92%)</span></div>

    // --- PAGE 13: OUTCOME PREDICTION ---
    function OutcomePrediction({ currentCase }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to predict outcomes.</div>;

      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);

      const handleAnalyze = async () => {
        setLoading(true);
        try {
          const res = await axios.get(`/api/v1/intelligence/outcome-analysis/${currentCase.id}`);
          setData(res.data);
        } catch (e) {
          console.error(e);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="max-w-2xl mx-auto space-y-6">
          <div class="glass-panel p-5 rounded-xl border border-slate-800 space-y-4">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-200">Judicial Outcome & Liability Estimator</h3>
            <p class="text-xs text-slate-400 leading-relaxed">
              Using statistical features of your case (digital evidence logs, physical weapon cataloging, and chain-of-custody consistency) the system estimates prosecution success rates and chargesheet timeline lags.
            </p>
            <button 
              onClick={handleAnalyze}
              disabled={loading}
              class="bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold uppercase tracking-wider py-2 px-6 rounded transition-all"
            >
              {loading ? "Calculating models..." : "Run Predictive Analytics"}
            </button>
          </div>

          {data && (
            <div class="glass-panel p-6 rounded-xl border border-slate-800 space-y-6">
              <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-900/60 rounded border border-slate-850 text-center">
                  <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest">Prosecution Likelihood</p>
                  <p class="text-2xl font-black text-cyan-400 mt-1">{data.prosecution_probability}%</p>
                </div>
                <div class="p-4 bg-slate-900/60 rounded border border-slate-850 text-center">
                  <p class="text-xxs font-bold text-slate-500 uppercase tracking-widest">Charge Sheet Submission Window</p>
                  <p class="text-2xl font-black text-amber-400 mt-1">~{data.estimated_chargesheet_days} Days</p>
                </div>
              </div>

              <div class="space-y-2">
                <h4 class="text-xxs font-bold text-slate-400 uppercase tracking-widest">Legal Vulnerabilities Highlighted</h4>
                <ul class="space-y-1.5">
                  {data.legal_risks.map((risk, i) => (
                    <li key={i} class="text-xs text-slate-300 flex items-start space-x-2">
                      <span class="text-amber-500 mt-0.5">•</span>
                      <span>{risk}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- PAGE 14: AI CHATBOT CO-PILOT ---
    function ChatbotAssistant({ currentCase }) {
      const [messages, setMessages] = useState([
        { role: 'assistant', text: "Hello Officer. I am your CrimeIntel AI investigation assistant. Select an active case context above or type a query about navigation and leads." }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const chatEndRef = useRef(null);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = async (textToSend) => {
        const query = textToSend || input;
        if (!query.trim()) return;

        setMessages(prev => [...prev, { role: 'user', text: query }]);
        if (!textToSend) setInput('');
        setLoading(true);

        try {
          const res = await axios.post('/api/v1/chat/', {
            message: query,
            case_id: currentCase ? currentCase.id : null
          });
          setMessages(prev => [...prev, { 
            role: 'assistant', 
            text: res.data.reply,
            suggestions: res.data.suggested_actions 
          }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: 'assistant', text: "Connection error with NLP model service." }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div class="max-w-2xl mx-auto h-[500px] glass-panel border border-slate-800 rounded-xl flex flex-col overflow-hidden">
          {/* Chat Header */}
          <div class="px-4 py-3 bg-slate-900/60 border-b border-slate-850 flex items-center justify-between">
            <div class="flex items-center space-x-2">
              <i data-lucide="message-square" class="w-4 h-4 text-cyan-400"></i>
              <span class="text-xs font-bold uppercase tracking-wider text-slate-200">AI Copilot Chat</span>
            </div>
            {currentCase && <span class="text-xxs bg-cyan-950 text-cyan-400 px-2 py-0.5 rounded border border-cyan-900 uppercase font-semibold">{currentCase.case_number} Context</span>}
          </div>

          {/* Messages */}
          <div class="flex-1 p-4 overflow-y-auto space-y-4">
            {messages.map((m, i) => (
              <div key={i} class={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div class={`max-w-[80%] rounded-lg p-3 text-xs leading-relaxed ${
                  m.role === 'user' 
                    ? 'bg-cyan-600 text-white font-medium rounded-br-none' 
                    : 'bg-slate-900 border border-slate-850 text-slate-200 rounded-bl-none'
                }`}>
                  <div dangerouslySetInnerHTML={{ __html: m.text }}></div>
                  
                  {/* Suggestions bubbles */}
                  {m.suggestions && m.suggestions.length > 0 && (
                    <div class="mt-2.5 pt-2 border-t border-slate-850 flex flex-wrap gap-1.5">
                      {m.suggestions.map((s, idx) => (
                        <button 
                          key={idx} 
                          onClick={() => handleSend(s)}
                          class="bg-slate-950 hover:bg-cyan-950 border border-slate-800 hover:border-cyan-800 text-xxs text-cyan-400 px-2 py-0.5 rounded transition-all"
                        >
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {loading && <div class="text-xxs text-cyan-400 italic">Copilot parsing prompt contexts...</div>}
            <div ref={chatEndRef} />
          </div>

          {/* Input Footer */}
          <div class="p-3 bg-slate-900/60 border-t border-slate-850 flex space-x-2">
            <input 
              type="text" 
              class="flex-1 bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs outline-none focus:border-cyan-500 text-white" 
              placeholder="Ask: 'summarize case', 'how to see maps', or 'get checklist'..."
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSend()}
            />
            <button 
              onClick={() => handleSend()}
              class="bg-cyan-600 hover:bg-cyan-500 text-white p-2 rounded transition-all"
            >
              <i data-lucide="send" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      );
    }

    // --- PAGE 15 & 26: PDF REPORT DOWNLOAD ---
    function ReportDownload({ currentCase }) {
      if (!currentCase) return <div class="text-xs text-slate-400">Establish a Case Context above to access dossiers.</div>;

      const handleDownload = () => {
        // Open browser stream directly
        window.open(`/api/v1/reports/case/${currentCase.id}/download`, '_blank');
      };

      return (
        <div class="max-w-md mx-auto mt-12 glass-panel p-6 rounded-xl border border-slate-800 text-center space-y-4">
          <div class="w-12 h-12 rounded-full bg-cyan-950 text-cyan-400 flex items-center justify-center mx-auto mb-2">
            <i data-lucide="file-text" class="w-6 h-6"></i>
          </div>
          <div>
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-100">Download Crime Dossier PDF</h2>
            <p class="text-xxs text-slate-400 uppercase tracking-widest mt-1">FIR Ref: {currentCase.case_number}</p>
          </div>
          <p class="text-xs text-slate-400 leading-relaxed">
            Generate and export a sealed PDF investigation report containing case summaries, evidence tables, chain-of-custody handovers, GNN leads, and checkpoint checklist updates.
          </p>
          <button 
            onClick={handleDownload}
            class="w-full bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-bold uppercase tracking-wider py-2.5 rounded transition-all flex items-center justify-center space-x-2"
          >
            <i data-lucide="download" class="w-4 h-4"></i>
            <span>Export Official PDF Dossier</span>
          </button>
        </div>
      );
    }

    // --- PAGE 17: INDIA EMERGENCY HELP NUMBERS ---

            <h2 class="text-lg font-bold uppercase tracking-wider text-slate-100">National Emergency Support Desk</h2>
            <p class="text-xs text-slate-400">Emergency Hotlines & Agency Helplines (India Division)</p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            {numbers.map((n, i) => (

                  {n.number}
                </span>
              </div>
            ))}
          </div>
        </div>

    }

      const logs = [
        {"timestamp": "2026-06-19T21:35:10", "user": "admin_system", "action": "Logged Database Boot", "ip": "127.0.0.1"},

      ];

      return (
        <div class="max-w-4xl mx-auto space-y-6">
          <div>
            <h2 class="text-lg font-bold uppercase tracking-wider text-slate-100">Cryptographic System Audit Trails</h2>
            <p class="text-xs text-slate-400">Security Access Logs & Action Registers (Section IPC 43 Compliance)</p>
          </div>

          <div class="glass-panel rounded-xl border border-slate-800 overflow-hidden">
            <table class="w-full text-left text-xs border-collapse">
              <thead>
                <tr class="bg-slate-900/60 text-slate-400 uppercase tracking-widest text-xxs border-b border-slate-850">
                  <th class="p-3">Timestamp</th>
                  <th class="p-3">Officer Logged</th>
                  <th class="p-3">Operation Action</th>
                  <th class="p-3">Network IP</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-850">
                {logs.map((log, i) => (
                  <tr key={i} class="hover:bg-slate-900/30 text-slate-300">
                    <td class="p-3 font-mono text-xxs">{log.timestamp}</td>
                    <td class="p-3 font-semibold text-slate-200">{log.user}</td>
                    <td class="p-3">{log.action}</td>
                    <td class="p-3 font-mono text-xxs text-slate-400">{log.ip}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
