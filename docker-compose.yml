version: '3.8'

services:
  # 1. Relational Database - PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: crimeintel_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: crimeintel_sql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Document Database - MongoDB
  mongodb:
    image: mongo:6.0
    container_name: crimeintel_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 3. Graph Database - Neo4j
  neo4j:
    image: neo4j:5.12-community
    container_name: crimeintel_neo4j
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
    volumes:
      - neo4j_data:/data

  # 4. Backend Service - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crimeintel_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - evidence_vault:/app/evidence_storage
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/crimeintel_sql
      - MONGODB_URL=mongodb://mongodb:27017/crimeintel_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    depends_on:
      - db
      - mongodb
      - neo4j

  # 5. Frontend Service - React Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crimeintel_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  evidence_vault:
